<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercury - 空状态</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
        }

        .empty-state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        justify-content: center;
            height: 100vh;
            padding: 40px;
        }

        .empty-icon {
            font-size: 80px;
            margin-bottom: 24px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 12px;
        }

        .empty-description {
         font-size: 14px;
            color: #909399;
            text-align: center;
            line-height: 1.6;
            max-width: 400px;
            margin-bottom: 24px;
        }

        .empty-action {
         display: flex;
            gap: 12px;
        }

        .btn {
       padding: 12px 24px;
            border: 1px solid #dcdfe6;
            background: #ffffff;
            border-radius: 4px;
          cursor: pointer;
            font-size: 14px;
        transition: all 0.2s;
        }

        .btn:hover {
            background: #f5f7fa;
            border-color: #409eff;
            color: #409eff;
        }

        .btn-primary {
         background: #409eff;
            color: #ffffff;
          border-color: #409eff;
      }

        .btn-primary:hover {
         background: #66b1ff;
     }

        /* 三栏布局的空状态 */
        .app-container {
            display: flex;
          height: 100vh;
        }

        .feed-sidebar {
         width: 280px;
            background: #ffffff;
            border-right: 1px solid #e4e7ed;
        }

        .article-list {
            width: 380px;
            background: #ffffff;
            border-right: 1px solid #e4e7ed;
      }

        .reader-view {
            flex: 1;
            background: #ffffff;
        }

        .empty-state-inline {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 40px;
        }

        .empty-state-inline .empty-icon {
            font-size: 64px;
        }

      .empty-state-inline .empty-title {
       font-size: 16px;
        }

        .empty-state-inline .empty-description {
         font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- 场景 1: 无订阅源（全屏空状态） -->
    <div class="empty-state-container">
        <div class="empty-icon">📰</div>
      <div class="empty-title">还没有订阅源</div>
        <div class="empty-description">
            添加您感兴趣的 RSS 订阅源，开始获取最新资讯。<br>
            您也可以从其他阅读器导入 OPML 文件。
        </div>
        <div class="empty-action">
            <button class="btn btn-primary">+ 添加订阅源</button>
            <button class="btn">导入 OPML</button>
        </div>
    </div>
